services:
  - type: web
    name: opencms
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn church.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cmsdb-service
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "opencms.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.1"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BACKEND_ADMIN_EMAIL
        value: "backend@example.com"
      - key: BACKEND_ADMIN_PASSWORD
        sync: false
    postBuildCommand: python manage.py migrate && python scripts/setup_admin.py
databases:
  - name: cmsdb-service
    databaseName: cmsdb
    plan: free